<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <!-- Fondo beige corporativo -->
  <rect width="800" height="400" fill="#F5F5F3"/>

  <!-- Logotipo cohesionado sin espacios y con "i" minúscula -->
