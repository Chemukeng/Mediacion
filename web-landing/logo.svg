    <tspan fill="#11372C">Med</tspan><tspan fill="#D4AF37" font-weight="bold">iA</tspan><tspan fill="#11372C">ción</tspan>
  </text>

  <!-- Eslogan -->
  <text x="400" y="260" font-family="Arial, 'Outfit', sans-serif" font-size="14" letter-spacing="8" fill="#11372C" text-anchor="middle">ACUERDOS INTELIGENTES</text>
</svg>
